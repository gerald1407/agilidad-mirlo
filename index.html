<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gery - Mentora de Productividad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        :root {
            --primary: #11d4c4;
            --deep-teal: #004D40;
            --soft-purple: #ede7f6;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f6f8f8; }
        
        /* Ajuste de altura para móviles (iPhone fix) */
        .chat-area { height: calc(100svh - 260px); overflow-y: auto; scroll-behavior: smooth; }

        /* Estilos para el contenido que genera la IA (Markdown) */
        .prose h3 { 
            font-size: 0.9rem !important; 
            font-weight: 700; 
            margin: 15px 0 8px 0;
            display: flex; 
            align-items: center; 
            gap: 8px;
            color: var(--deep-teal);
        }
        .prose table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; background: white; border-radius: 8px; overflow: hidden; }
        .prose th { background: var(--deep-teal); color: white; padding: 8px; }
        .prose td { border: 1px solid #e2e8f0; padding: 8px; }
        .prose blockquote { 
            background: #f0fdfa; border-left: 4px solid var(--primary); 
            padding: 12px; margin: 15px 0; border-radius: 4px; font-style: italic; color: var(--deep-teal);
        }
    </style>
</head>
<body class="bg-slate-100 flex justify-center">

<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md bg-white shadow-2xl">
    
    <header class="bg-[#004D40] text-white p-4 shrink-0 shadow-md">
        <div class="flex items-center gap-3 mb-4">
            <div class="size-12 rounded-full border-2 border-[#11d4c4] bg-white/20 flex items-center justify-center overflow-hidden">
                <span class="material-symbols-outlined text-3xl">account_circle</span>
            </div>
            <div>
                <h2 class="text-base font-bold leading-tight">Geraldine Cárdenas</h2>
                <p class="text-xs text-[#11d4c4] font-medium">Ingeniería & Estrategia de Valor</p>
            </div>
        </div>
        <div class="bg-white/10 rounded-xl p-3 backdrop-blur-sm">
            <p class="text-xs font-semibold mb-1">¡Hola! Soy Gery tu Mentora de Productividad con IA 🤖</p>
            <p class="text-[10px] text-slate-200 uppercase tracking-tight">Optimiza tu tiempo, maximiza tu valor.</p>
        </div>
    </header>

    <main id="chat-box" class="chat-area flex-1 p-4 space-y-6 bg-slate-50">
        <div class="flex flex-col items-center py-6 opacity-40">
            <span class="material-symbols-outlined text-4xl mb-2 text-[#004D40]">smart_toy</span>
            <p class="text-[10px] text-center px-10">Hoy es un gran día para ser productiva. ¿Qué planes tienes?</p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 p-4">
        <div class="flex flex-col gap-3">
            <div class="flex items-center gap-2">
                <input type="text" id="user-input" 
                       class="flex-1 bg-slate-100 border-none rounded-full py-3 px-5 text-sm focus:ring-2 focus:ring-[#11d4c4]" 
                       placeholder="Ej: Tengo muchas tareas...">
                <button onclick="sendMessage()" class="bg-[#004D40] text-white size-11 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
            <div class="text-center">
                <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">
                    POWERED BY: <a href="https://www.instagram.com/mirlo.digital/" target="_blank" class="text-[#11d4c4]">@MIRLODIGITAL</a>
                </p>
            </div>
        </div>
    </footer>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const sendButton = inputField.nextElementSibling; // El botón de enviar
        const message = inputField.value.trim();
        
        if (!message) return;

        // Desactivar interfaz mientras procesa
        inputField.disabled = true;
        sendButton.disabled = true;
        sendButton.style.opacity = "0.5";

        appendMessage('user', message);
        inputField.value = '';

        const typingId = 'typing-' + Date.now();
        appendMessage('ai', '...', typingId);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            
            // Eliminar burbuja de carga
            const typingElem = document.getElementById(typingId);
            if (typingElem) typingElem.closest('.message-row').remove();
            
            if (response.ok) {
                if (data.text) {
                    appendMessage('ai', data.text);
                } else {
                    appendMessage('ai', "⚠️ Gery no pudo generar una respuesta. Intenta de nuevo.");
                }
            } else {
                // Manejo específico de saturación (Error 429)
                if (response.status === 429) {
                    appendMessage('ai', "⚠️ ¡Gery está a tope! Estamos en vivo y hay muchas consultas. Por favor, espera 10 segundos y reintenta.");
                } else {
                    appendMessage('ai', "⚠️ Error: " + (data.error || "No se pudo conectar."));
                }
            }
        } catch (error) {
            console.error("Error en el chat:", error);
            // Si la burbuja de carga sigue ahí por un error de red, la quitamos
            const typingElem = document.getElementById(typingId);
            if (typingElem) typingElem.closest('.message-row').remove();
            appendMessage('ai', "⚠️ Hubo un problema de conexión. Revisa tu internet.");
        } finally {
            // Reactivar interfaz
            inputField.disabled = false;
            sendButton.disabled = false;
            sendButton.style.opacity = "1";
            inputField.focus();
        }
    }

    function appendMessage(sender, text, id = null) {
        const chatBox = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = `message-row flex items-end gap-2 mb-6 ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
        
        // Solo parsear Markdown si no es la burbuja de carga
        const content = (sender === 'ai' && text !== '...') ? marked.parse(text) : text;
        const bubbleClass = sender === 'user' 
            ? 'bg-[#ede7f6] text-[#004D40] rounded-2xl rounded-tr-none' 
            : 'bg-white border border-slate-100 rounded-2xl rounded-tl-none';

        row.innerHTML = `
            ${sender === 'ai' ? '<div class="size-7 rounded-full bg-[#004D40] flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-white text-[16px]">robot_2</span></div>' : ''}
            <div class="flex flex-col gap-1 max-w-[85%]">
                <span class="text-[9px] font-bold text-slate-400 uppercase px-1">${sender === 'user' ? 'Tú' : 'Gery'}</span>
                <div ${id ? `id="${id}"` : ''} class="prose prose-sm px-4 py-3 shadow-sm ${bubbleClass} text-sm">
                    ${content}
                </div>
            </div>
            ${sender === 'user' ? '<div class="size-7 rounded-full bg-slate-200 shrink-0 flex items-center justify-center"><span class="material-symbols-outlined text-slate-400 text-[16px]">person</span></div>' : ''}
        `;
        
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
