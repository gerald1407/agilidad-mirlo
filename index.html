<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geraldine Cárdenas - Asistente Ágil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    /* Colores Geraldine IA */
    :root {
        --primary: #074B4B;
        --secondary: #5DC1B9;
    }

    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #333; }
    
    /* Ajuste Mobile First para la altura del chat */
    .chat-container { 
        height: 60vh; 
        height: calc(100svh - 250px); /* Usa svh para evitar problemas con la barra de Safari en iPhone */
        overflow-y: auto; 
        padding: 10px;
    }

    /* Títulos de colores para los cuadrantes */
    .prose strong { display: block; margin-top: 15px; font-size: 1rem; }
    
    /* Calendario de Sprint optimizado para móvil */
    .prose table { width: 100%; border-collapse: collapse; margin: 15px 0; background: white; font-size: 0.8rem; }
    .prose th { background-color: var(--primary); color: white; padding: 8px; }
    .prose td { border: 1px solid #e2e8f0; padding: 8px; }

    /* Bloque de Tip más llamativo con tu color secundario */
    .prose blockquote { 
        background: #f0fdfa; 
        border-left: 5px solid var(--secondary); 
        padding: 15px; 
        margin: 20px 0; 
        border-radius: 8px;
        color: var(--primary);
        font-weight: 600;
    }

    /* Ajuste de burbujas para dedos (touch friendly) */
    input, button { font-size: 16px !important; } /* Evita el zoom automático en iPhone */
</style>

<header class="text-white p-4 shadow-lg text-center" style="background-color: var(--primary);">
    <h1 class="text-xl font-bold">Geraldine Cárdenas</h1>
    <p class="text-sm opacity-80">Ingeniería & Estrategia de Valor</p>
</header>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-indigo-900 text-white p-4 shadow-lg text-center">
        <h1 class="text-xl font-bold">Geraldine Cárdenas</h1>
        <p class="text-sm opacity-80">Ingeniería & Estrategia de Valor</p>
    </header>

    <main class="flex-grow p-4 max-w-2xl mx-auto w-full">
        <div class="bg-white rounded-xl shadow-md p-4 mb-4 border border-indigo-100">
            <p class="text-indigo-900 font-semibold mb-2">¡Hola! Soy tu Mentor IA 🤖</p>
            <p class="text-sm text-gray-600">Cuéntame tus pendientes de hoy y te ayudaré a organizarlos con el método de Geraldine.</p>
        </div>

        <div id="chat-box" class="chat-container space-y-4 mb-4 p-2"></div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-200 sticky bottom-0">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Ej: Tengo muchas tareas, ¿cómo priorizo?" 
                   class="flex-grow border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="sendMessage()" id="send-btn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">
                Enviar
            </button>
        </div>
        <p class="text-[10px] text-center mt-2 text-gray-400 text-uppercase tracking-widest uppercase">Powered by Groq AI & Geraldine Cárdenas</p>
    </footer>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const message = inputField.value.trim();
        if (!message) return;

        appendMessage('user', message);
        inputField.value = '';

        const typingId = 'typing-' + Date.now();
        appendMessage('ai', '...', typingId);

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            
            // Eliminamos el "pensando..."
            document.getElementById(typingId)?.closest('.message-wrapper').remove();
            
            if (response.ok && data.text) {
                appendMessage('ai', data.text);
            } else {
                appendMessage('ai', "⚠️ Error técnico: " + (data.detail || data.error));
            }
        } catch (error) {
            document.getElementById(typingId)?.closest('.message-wrapper').remove();
            appendMessage('ai', "❌ Error de red: No pude contactar con el servidor.");
        }
    }

    function appendMessage(sender, text, id = null) {
        const chatBox = document.getElementById('chat-box');
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper flex ${sender === 'user' ? 'justify-end' : 'justify-start'} mb-4`;
        
        // 3. CAMBIO CLAVE: Usamos marked.parse para convertir el texto a HTML con tablas
        // También añadimos la clase 'prose' para que Tailwind aplique estilos de texto
        const content = sender === 'ai' && text !== '...' ? marked.parse(text) : text;

        wrapper.innerHTML = `
            <div ${id ? `id="${id}"` : ''} class="prose max-w-[85%] p-3 rounded-lg shadow-sm ${
                sender === 'user' 
                ? 'bg-indigo-600 text-white' 
                : 'bg-white border border-gray-200 text-gray-800'
            } text-sm">
                ${content}
            </div>
        `;
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
