<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gery - Mentora de Productividad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        :root {
            --primary: #11d4c4;
            --deep-teal: #004D40;
            --soft-purple: #ede7f6;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f6f8f8; }
        
        .chat-area { height: calc(100svh - 260px); overflow-y: auto; scroll-behavior: smooth; }

        .prose h3 { 
            font-size: 0.9rem !important; 
            font-weight: 700; 
            margin: 15px 0 8px 0;
            display: flex; 
            align-items: center; 
            gap: 8px;
            color: var(--deep-teal);
        }
        .prose table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; background: white; border-radius: 8px; overflow: hidden; }
        .prose th { background: var(--deep-teal); color: white; padding: 8px; }
        .prose td { border: 1px solid #e2e8f0; padding: 8px; }
        .prose blockquote { 
            background: #f0fdfa; border-left: 4px solid var(--primary); 
            padding: 12px; margin: 15px 0; border-radius: 4px; font-style: italic; color: var(--deep-teal);
        }
        
        .method-link {
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            color: var(--deep-teal);
            font-weight: 600;
        }
        .method-link:hover { color: var(--primary); }

        .explanation-row {
            background-color: #f0fdfa !important;
            font-size: 0.75rem;
            color: #065f46;
            animation: fadeIn 0.3s ease-in;
        }

        /* Estilo del Botón WhatsApp */
        .whatsapp-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #25D366;
            color: white !important;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 10px;
            width: fit-content;
        }
        .whatsapp-btn:hover { background-color: #1ebe57; transform: scale(1.03); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 flex justify-center">

<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md bg-white shadow-2xl">
    <header class="bg-[#004D40] text-white p-4 shrink-0 shadow-md">
        <div class="flex items-center gap-3 mb-4">
            <div class="size-12 rounded-full border-2 border-[#11d4c4] bg-white/20 flex items-center justify-center overflow-hidden">
                <span class="material-symbols-outlined text-3xl">account_circle</span>
            </div>
            <div>
                <h2 class="text-base font-bold leading-tight">Geraldine Cárdenas</h2>
                <p class="text-xs text-[#11d4c4] font-medium">Ingeniería & Estrategia de Valor</p>
            </div>
        </div>
        <div class="bg-white/10 rounded-xl p-3 backdrop-blur-sm">
            <p class="text-xs font-semibold mb-1">¡Hola! Soy Gery tu Mentora de Productividad con IA 🤖</p>
            <p class="text-[10px] text-slate-200 uppercase tracking-tight">Optimiza tu tiempo, maximiza tu valor.</p>
        </div>
    </header>

    <main id="chat-box" class="chat-area flex-1 p-4 space-y-6 bg-slate-50">
        <div class="flex flex-col items-center py-6 opacity-40">
            <span class="material-symbols-outlined text-4xl mb-2 text-[#004D40]">smart_toy</span>
            <p class="text-[10px] text-center px-10">Hoy es un gran día para ser productiva. ¿Qué planes tienes?</p>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 p-4">
        <div class="flex flex-col gap-3">
            <div class="flex items-center gap-2">
                <input type="text" id="user-input" 
                       class="flex-1 bg-slate-100 border-none rounded-full py-3 px-5 text-sm focus:ring-2 focus:ring-[#11d4c4]" 
                       placeholder="Ej: Tengo muchas tareas...">
                <button onclick="sendMessage()" class="bg-[#004D40] text-white size-11 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
            <div class="text-center">
                <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">
                    POWERED BY: <a href="https://www.instagram.com/mirlo.digital/" target="_blank" class="text-[#11d4c4]">@MIRLODIGITAL</a>
                </p>
            </div>
